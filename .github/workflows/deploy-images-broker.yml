name: Deploy images_broker to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - "images_broker/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: images_broker
        run: npm ci

      - name: Zip package (including node_modules)
        working-directory: images_broker
        run: zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: az functionapp deployment source config-zip --resource-group DefaultResourceGroup-ILC --name images-broker --src deploy.zip --timeout 300
